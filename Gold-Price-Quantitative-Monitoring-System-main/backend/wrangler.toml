# ============================================================
# Cloudflare Workers 配置文件
# 黄金价格检测系统 - 后端服务
# ============================================================
name = "gold-price-monitor-api"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ============================================================
# 自定义域名配置
# ============================================================
[[routes]]
pattern = "gold-backend.chuankangkk.top"
custom_domain = true

# ============================================================
# 定时任务配置（Cron Triggers）
# 每30分钟触发一次价格监控和推送
# ============================================================
[triggers]
crons = ["*/30 * * * *"]

# ============================================================
# 环境变量配置
# ============================================================
[vars]
# 生产环境请使用 wrangler secret 设置敏感信息
# MODELSCOPE_API_KEY = "your-api-key"

# ============================================================
# 开发环境配置
# ============================================================
[dev]
port = 8787
local_protocol = "http"
